<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音速记台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-1: #040612;
            --bg-2: #0c1536;
            --card-bg: rgba(13, 19, 45, 0.75);
            --card-border: rgba(149, 168, 255, 0.22);
            --text-main: #eaf0ff;
            --text-sub: #93a1c6;
            --accent: #6d8bff;
            --accent-2: #53e1d2;
            --danger: #ff4f88;
        }
        body {
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
            background:
                radial-gradient(circle at 20% 20%, rgba(112, 92, 255, 0.32), transparent 38%),
                radial-gradient(circle at 80% 15%, rgba(55, 201, 255, 0.24), transparent 36%),
                radial-gradient(circle at 70% 85%, rgba(54, 255, 171, 0.12), transparent 40%),
                linear-gradient(145deg, var(--bg-1), var(--bg-2));
        }
        .shell {
            width: min(980px, 100%);
            border-radius: 28px;
            border: 1px solid var(--card-border);
            background: linear-gradient(180deg, rgba(20, 31, 72, 0.78), rgba(8, 12, 29, 0.92));
            box-shadow: 0 22px 70px rgba(0, 0, 0, 0.52), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            overflow: hidden;
            backdrop-filter: blur(8px);
        }
        .hero {
            padding: 34px 34px 20px 34px;
            border-bottom: 1px solid rgba(123, 144, 236, 0.2);
        }
        .hero-top { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #bed3ff;
            background: rgba(109, 139, 255, 0.2);
            border: 1px solid rgba(153, 184, 255, 0.32);
            border-radius: 999px;
            padding: 8px 12px;
        }
        .brand i {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-2);
            box-shadow: 0 0 10px rgba(83, 225, 210, 0.8);
        }
        h1 { margin-top: 14px; font-size: clamp(26px, 4vw, 38px); font-weight: 700; letter-spacing: -0.02em; }
        .subtitle { margin-top: 10px; color: var(--text-sub); font-size: 15px; }
        .status-bar {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(139, 159, 237, 0.22);
            background: rgba(12, 20, 49, 0.82);
            border-radius: 14px;
            padding: 12px 14px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #717f9f;
            transition: all 0.3s ease;
        }
        .status-dot.connected { background: #36d7a4; box-shadow: 0 0 12px rgba(54, 215, 164, 0.82); animation: pulse 2s infinite; }
        .status-dot.recording { background: #ff5b8f; box-shadow: 0 0 14px rgba(255, 91, 143, 0.75); animation: pulse-red 0.9s infinite; }
        .status-text { color: #c7d5ff; font-size: 14px; }
        .toolbar {
            padding: 22px 34px 10px 34px;
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 16px;
            align-items: center;
        }
        .mode-selector label {
            display: block;
            font-size: 12px;
            color: #9eb0de;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .mode-selector select {
            width: 100%;
            appearance: none;
            border-radius: 12px;
            border: 1px solid rgba(138, 161, 244, 0.5);
            background: linear-gradient(160deg, rgba(34, 46, 95, 0.75), rgba(14, 20, 42, 0.88));
            color: #eef2ff;
            font-size: 15px;
            padding: 12px 14px;
            outline: none;
        }
        .controls { display: flex; gap: 12px; }
        .btn {
            border: none;
            border-radius: 12px;
            padding: 13px 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            width: 100%;
        }
        .btn-primary {
            color: #f6f9ff;
            background: linear-gradient(135deg, #5e7dff 0%, #3cc3ff 100%);
            box-shadow: 0 10px 24px rgba(80, 136, 255, 0.34);
        }
        .btn-danger {
            color: #fff2f7;
            background: linear-gradient(135deg, #ff4f88 0%, #ff7a4f 100%);
            box-shadow: 0 10px 24px rgba(255, 96, 136, 0.33);
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .main { padding: 14px 34px 34px 34px; }
        .waveform {
            height: 84px;
            border-radius: 14px;
            background: rgba(12, 20, 49, 0.9);
            border: 1px solid rgba(124, 149, 240, 0.24);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 14px;
        }
        .wave-bar {
            width: 4px;
            background: linear-gradient(180deg, #6f8eff 0%, #4ae7ca 100%);
            border-radius: 999px;
            transition: height 0.08s linear;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-top: 14px;
        }
        .stat-card {
            border: 1px solid rgba(130, 149, 218, 0.2);
            background: rgba(13, 20, 47, 0.7);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
        }
        .stat-value { font-size: 23px; font-weight: 700; color: #f2f6ff; }
        .stat-label { margin-top: 6px; font-size: 12px; color: #93a1c6; }
        .result-container {
            margin-top: 14px;
            min-height: 240px;
            max-height: 430px;
            overflow-y: auto;
            border: 1px solid rgba(142, 163, 244, 0.24);
            background: rgba(8, 13, 35, 0.96);
            border-radius: 14px;
            padding: 18px 18px 24px 18px;
        }
        .result-label {
            color: #9cb2ef;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .segment-count {
            padding: 3px 9px;
            border-radius: 999px;
            background: rgba(65, 90, 171, 0.34);
            color: #dce5ff;
            font-size: 12px;
        }
        .result-text {
            color: #f5f7ff;
            font-size: clamp(18px, 2.2vw, 24px);
            line-height: 1.8;
            word-wrap: break-word;
            letter-spacing: 0.01em;
        }
        .result-text.empty { color: #7487b8; font-style: italic; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.55; transform: scale(1.15); }
        }
        @keyframes pulse-red {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.92); }
        }
        @media (max-width: 800px) {
            body { padding: 16px; }
            .hero, .toolbar, .main { padding-left: 18px; padding-right: 18px; }
            .toolbar { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <section class="hero">
            <div class="hero-top">
                <span class="brand"><i></i>Voice Workspace</span>
            </div>
            <h1>语音速记台</h1>
            <p class="subtitle">实时采集语音并快速生成可编辑文本</p>
            <div class="status-bar">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">正在连接服务...</span>
            </div>
        </section>
        <section class="toolbar">
            <div class="mode-selector">
                <label for="langMode">语言</label>
                <select id="langMode">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="controls">
                <button class="btn btn-primary" id="startBtn" disabled>开始录音</button>
                <button class="btn btn-danger" id="stopBtn" disabled>结束录音</button>
            </div>
        </section>
        <section class="main">
            <div class="waveform" id="waveform"></div>
            <div class="stats" id="stats" style="display: none;">
                <div class="stat-card">
                    <div class="stat-value" id="segmentCount">0</div>
                    <div class="stat-label">段落数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="audioLength">0s</div>
                    <div class="stat-label">录音时长</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="isRecording">否</div>
                    <div class="stat-label">录音状态</div>
                </div>
            </div>
            <div class="result-container">
                <div class="result-label">
                    识别文本
                    <span class="segment-count" id="segmentCountBadge">0 段</span>
                </div>
                <div class="result-text empty" id="resultText">点击“开始录音”后即可说话，文本将实时显示在这里。</div>
            </div>
        </section>
    </div>

    <script>
        let ws = null;
        let mediaStream = null;
        let audioContext = null;
        let processor = null;
        let sourceNode = null;
        let isRecording = false;
        let startTime = 0;
        let totalSamples = 0;
        let committedText = '';
        let partialText = '';
        let frozenPartialPrefix = '';
        let lastRawPartialText = '';

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resultText = document.getElementById('resultText');
        const waveform = document.getElementById('waveform');
        const stats = document.getElementById('stats');
        const segmentCountEl = document.getElementById('segmentCount');
        const segmentCountBadge = document.getElementById('segmentCountBadge');
        const audioLengthEl = document.getElementById('audioLength');
        const isRecordingEl = document.getElementById('isRecording');

        // 初始化波形条
        function initWaveform() {
            waveform.innerHTML = '';
            for (let i = 0; i < 70; i++) {
                const bar = document.createElement('div');
                bar.className = 'wave-bar';
                bar.style.height = '8px';
                waveform.appendChild(bar);
            }
        }
        initWaveform();

        // 连接 WebSocket
        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${location.host}/ws/vad-asr`;

            statusText.textContent = '正在连接...';
            statusDot.className = 'status-dot';

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusText.textContent = '已连接，准备开始';
                statusDot.className = 'status-dot connected';
                startBtn.disabled = false;
            };

            ws.onclose = () => {
                statusText.textContent = '连接断开';
                statusDot.className = 'status-dot';
                startBtn.disabled = true;
                stopBtn.disabled = true;
                if (isRecording) {
                    stopRecording();
                }
                setTimeout(connect, 3000);
            };

            ws.onerror = (err) => {
                console.error('WebSocket 错误:', err);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
        }

        function longestCommonPrefix(a, b) {
            const maxLen = Math.min(a.length, b.length);
            let i = 0;
            while (i < maxLen && a[i] === b[i]) {
                i += 1;
            }
            return a.slice(0, i);
        }

        function mergeOverlappingText(previousText, nextText) {
            if (!previousText) return nextText || '';
            if (!nextText) return previousText || '';
            if (nextText.startsWith(previousText)) return nextText;
            if (previousText.includes(nextText)) return previousText;

            const maxOverlap = Math.min(previousText.length, nextText.length);
            for (let overlap = maxOverlap; overlap > 0; overlap -= 1) {
                if (previousText.slice(-overlap) === nextText.slice(0, overlap)) {
                    return previousText + nextText.slice(overlap);
                }
            }

            return nextText;
        }

        function buildStablePreview() {
            const previewTail = partialText.startsWith(frozenPartialPrefix)
                ? partialText.slice(frozenPartialPrefix.length)
                : partialText;

            const previewText = committedText
                ? `${committedText} ${(frozenPartialPrefix + previewTail).trim()}`.trim()
                : (frozenPartialPrefix + previewTail).trim();

            return previewText.trim();
        }

        function refreshResultDisplay() {
            const preview = buildStablePreview();
            if (preview) {
                resultText.textContent = preview;
            }
        }

        function handleMessage(data) {
            switch (data.type) {
                case 'started':
                    committedText = '';
                    partialText = '';
                    frozenPartialPrefix = '';
                    lastRawPartialText = '';
                    resultText.textContent = '';
                    resultText.classList.remove('empty');
                    stats.style.display = 'grid';
                    segmentCountEl.textContent = '0';
                    segmentCountBadge.textContent = '0 段';
                    audioLengthEl.textContent = '0s';
                    startTime = Date.now();
                    totalSamples = 0;
                    break;

                case 'result':
                    if (data.text) {
                        committedText = data.text;
                        partialText = '';
                        frozenPartialPrefix = '';
                        lastRawPartialText = '';
                        resultText.textContent = committedText;
                    } else {
                        // 避免空消息把界面刷成空白；仍保留最后一次预览
                        refreshResultDisplay();
                    }
                    if (data.segments !== undefined) {
                        segmentCountEl.textContent = data.segments;
                        segmentCountBadge.textContent = data.segments + ' 段';
                    }
                    if (data.final) {
                        resultText.style.fontWeight = 'bold';
                    } else {
                        resultText.style.fontWeight = 'normal';
                    }
                    break;

                case 'partial':
                    if (data.committed_text !== undefined) {
                        if (data.committed_text.length >= committedText.length) {
                            committedText = data.committed_text;
                        }
                    }

                    if (data.partial_text) {
                        const commonPrefix = longestCommonPrefix(lastRawPartialText, data.partial_text);
                        if (commonPrefix.length > frozenPartialPrefix.length) {
                            frozenPartialPrefix = commonPrefix;
                        }
                        partialText = mergeOverlappingText(partialText, data.partial_text);
                        lastRawPartialText = data.partial_text;
                    }

                    if (committedText || partialText) {
                        refreshResultDisplay();
                        resultText.style.fontWeight = 'normal';
                    } else if (data.text) {
                        // 兼容旧消息格式
                        resultText.textContent = data.text;
                        resultText.style.fontWeight = 'normal';
                    }
                    if (data.segments !== undefined) {
                        segmentCountEl.textContent = data.segments;
                        segmentCountBadge.textContent = data.segments + ' 段';
                    }
                    break;

                case 'error':
                    resultText.textContent = '错误: ' + data.message;
                    resultText.classList.add('empty');
                    break;

                case 'pong':
                    break;
            }
        }

        async function startRecording() {
            try {
                // 开启浏览器噪声抑制/回声消除：关闭时环境底噪易被 Silero 判为“持续在说话”，句尾无法断句
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                audioContext = new AudioContext({ sampleRate: 16000 });
                sourceNode = audioContext.createMediaStreamSource(mediaStream);

                // 创建 ScriptProcessorNode 处理音频
                const bufferSize = 2048;
                processor = audioContext.createScriptProcessor(bufferSize, 1, 1);

                processor.onaudioprocess = (e) => {
                    if (!isRecording) return;

                    const inputData = e.inputBuffer.getChannelData(0);
                    totalSamples += inputData.length;
                    sendAudioData(inputData);
                    updateWaveform(inputData);

                    const duration = totalSamples / 16000;
                    audioLengthEl.textContent = duration.toFixed(1) + 's';
                };

                sourceNode.connect(processor);
                processor.connect(audioContext.destination);

                // 开始识别会话，附带语言模式
                const langMode = document.getElementById('langMode').value;
                ws.send(JSON.stringify({ type: 'start', mode: langMode }));
                isRecording = true;

                document.getElementById('langMode').disabled = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusDot.className = 'status-dot recording';
                const modeLabel = langMode === 'en' ? 'English' : '中文';
                statusText.textContent = '正在录音（' + modeLabel + '）';
                isRecordingEl.textContent = '是';

            } catch (err) {
                alert('无法访问麦克风: ' + err.message);
                console.error(err);
            }
        }

        function sendAudioData(audioData) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;

            const float32Array = new Float32Array(audioData);
            const bytes = new Uint8Array(float32Array.buffer);
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            const base64 = btoa(binary);

            ws.send(JSON.stringify({
                type: 'audio',
                data: base64
            }));
        }

        function updateWaveform(audioData) {
            const bars = waveform.querySelectorAll('.wave-bar');
            const step = Math.floor(audioData.length / bars.length);

            bars.forEach((bar, i) => {
                let sum = 0;
                for (let j = 0; j < step; j++) {
                    const idx = i * step + j;
                    if (idx < audioData.length) {
                        sum += Math.abs(audioData[idx]);
                    }
                }
                const avg = sum / step;
                const height = Math.max(8, avg * 200);
                bar.style.height = height + 'px';
            });
        }

        function stopRecording() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'stop' }));
            }

            if (processor) {
                processor.disconnect();
                processor = null;
            }
            if (sourceNode) {
                sourceNode.disconnect();
                sourceNode = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }

            isRecording = false;
            // 停录后先保留最后一次 partial 预览，等服务端最终 result 到来再清空，
            // 避免出现”识别过程有字，停录瞬间整段消失”的错觉
            document.getElementById('langMode').disabled = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusDot.className = 'status-dot connected';
            statusText.textContent = '已连接，等待开始';
            isRecordingEl.textContent = '否';

            // 重置波形
            const bars = waveform.querySelectorAll('.wave-bar');
            bars.forEach(bar => bar.style.height = '8px');
        }

        // 事件监听
        startBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);

        // 初始化连接
        connect();

        // 保活
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'ping' }));
            }
        }, 20000);
    </script>
</body>
</html>
